<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nico & Neo Bingo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: #f0f0f0;
      margin: 0;
    }

    #controls {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #settings {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    #settings label,
    #settings select {
      font-size: 16px;
    }

    #title {
      font-size: 20px;
      font-weight: bold;
    }

    button,
    select {
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: #fff;
      transition: background 0.3s;
    }

    button:hover:not(:disabled) {
      background: #0056b3;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #continueBtn {
      display: none;
      background: #28a745;
    }

    #continueBtn:hover:not(:disabled) {
      background: #1e7e34;
    }

    #newGameBtn {
      display: none;
      background: #ff9800;
    }

    #newGameBtn:hover:not(:disabled) {
      background: #e68900;
    }

    #statusBar {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
      text-align: center;
    }

    #currentArea {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #current {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #current-letter {
      font-size: 80px;
      font-weight: bold;
      color: red;
      line-height: 1;
    }

    #current-number {
      font-size: 50px;
      font-weight: bold;
      line-height: 1;
    }

    #currentButtons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #history {
      margin-bottom: 20px;
      font-size: 18px;
      text-align: center;
      max-width: 1000px;
      line-height: 1.5;
    }

    #cards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
      width: 100%;
    }

    .card {
      background: #fff;
      border: 2px solid #007bff;
      border-radius: 8px;
      padding: 5px;
      transform: scale(0.6);
      transform-origin: top left;
    }

    .card-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      text-align: center;
    }

    .card table {
      border-collapse: collapse;
    }

    .card th,
    .card td {
      border: 1px solid #ccc;
      width: 28px;
      height: 28px;
      text-align: center;
      vertical-align: middle;
      font-size: 12px;
      padding: 1px;
    }

    .card th {
      background: #007bff;
      color: #fff;
      font-size: 12px;
    }

    .marked {
      background: #ffeb3b;
    }

    .completed {
      background: #00ff00;
      font-weight: bold;
    }

    #winner {
      font-size: 24px;
      font-weight: bold;
      color: #d9534f;
      margin-top: 10px;
      text-align: center;
      min-height: 32px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div id="title">Nico & Neo Bingo</div>

    <div id="settings">
      <label for="playerCount">Spelare:</label>
      <select id="playerCount">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2" selected>2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
</select>

      <label for="gameMode">Läge:</label>
      <select id="gameMode">
        <option value="standard">Standard Bingo</option>
        <option value="three-level">Bingo 3 nivåer</option>
      </select>
    </div>

    <button id="startBtn">Starta</button>
    <button id="bingoBtn">BINGO</button>
    <button id="toggleSpeakBtn">Tal: Av</button>
    <button id="resetBtn">Återställ</button>
  </div>

  <div id="statusBar">Standard Bingo</div>

  <div id="currentArea">
    <div id="current">
      <div id="current-letter">-</div>
      <div id="current-number"></div>
    </div>

    <div id="currentButtons">
      <button id="continueBtn">Fortsätt</button>
      <button id="newGameBtn">Starta nytt spel</button>
    </div>
  </div>

  <div id="history"></div>
  <div id="cards"></div>
  <div id="winner"></div>

  <audio id="bgm" src="audio/background.mp3" loop autoplay></audio>
  <audio id="ding" src="audio/ding.mp3"></audio>
  <audio id="bingoSound" src="audio/bingo.mp3"></audio>

  <script>
    const ranges = {
      B: [1, 15],
      I: [16, 30],
      N: [31, 45],
      G: [46, 60],
      O: [61, 75]
    };

    const numbers = Array.from({ length: 75 }, (_, i) => i + 1);

    let remaining = [];
    let drawn = [];
    let intervalId = null;
    let speakEnabled = false;

    let currentLevel = 1;
    let waitingForContinue = false;
    let gameFinished = false;

    const playerCountSelect = document.getElementById("playerCount");
    const gameModeSelect = document.getElementById("gameMode");
    const startBtn = document.getElementById("startBtn");
    const bingoBtn = document.getElementById("bingoBtn");
    const continueBtn = document.getElementById("continueBtn");
    const newGameBtn = document.getElementById("newGameBtn");
    const toggleSpeakBtn = document.getElementById("toggleSpeakBtn");
    const resetBtn = document.getElementById("resetBtn");

    const currentLetterEl = document.getElementById("current-letter");
    const currentNumberEl = document.getElementById("current-number");
    const historyEl = document.getElementById("history");
    const cardsContainer = document.getElementById("cards");
    const winnerEl = document.getElementById("winner");
    const statusBarEl = document.getElementById("statusBar");

    const bgm = document.getElementById("bgm");
    const ding = document.getElementById("ding");
    const bingoSound = document.getElementById("bingoSound");

    playerCountSelect.addEventListener("change", resetGame);
    gameModeSelect.addEventListener("change", resetGame);

    toggleSpeakBtn.addEventListener("click", () => {
      speakEnabled = !speakEnabled;
      toggleSpeakBtn.textContent = `Tal: ${speakEnabled ? "På" : "Av"}`;
    });

    startBtn.addEventListener("click", startGame);
    resetBtn.addEventListener("click", resetGame);
    continueBtn.addEventListener("click", continueAfterLevel);
    newGameBtn.addEventListener("click", startNewGame);

    bingoBtn.addEventListener("click", () => {
      stopGame();
      bingoSound.currentTime = 0;
      bingoSound.play().catch(() => {});
      winnerEl.textContent = "BINGO!";
    });

    window.addEventListener("load", () => {
      bgm.volume = 0.3;
      resetGame();
      bgm.play().catch(() => {});
    });

    function getMode() {
      return gameModeSelect.value;
    }

    function updateStatusBar() {
      if (getMode() === "standard") {
        statusBarEl.textContent = gameFinished ? "Standard Bingo - färdigt" : "Standard Bingo";
        return;
      }

      if (gameFinished) {
        statusBarEl.textContent = "Bingo 3 nivåer - färdigt";
        return;
      }

      if (waitingForContinue) {
        statusBarEl.textContent = `Bingo ${currentLevel} klart - tryck Fortsätt`;
        return;
      }

      statusBarEl.textContent = `Bingo 3 nivåer - spelar om Bingo ${currentLevel}`;
    }

    function getDelay() {
      return parseInt(playerCountSelect.value, 10) === 0 ? 10000 : 5000;
    }

    function startNewGame() {
      resetGame();
      startGame();
    }

    function resetGame() {
      stopGame();

      remaining = [...numbers];
      drawn = [];
      currentLevel = 1;
      waitingForContinue = false;
      gameFinished = false;

      currentLetterEl.textContent = "-";
      currentNumberEl.textContent = "";
      historyEl.textContent = "";
      winnerEl.textContent = "";
      cardsContainer.innerHTML = "";

      continueBtn.style.display = "none";
      newGameBtn.style.display = "none";

      generateCards(parseInt(playerCountSelect.value, 10));
      updateStatusBar();
    }

    function generateCards(count) {
      for (let i = 0; i < count; i++) {
        const cardDiv = document.createElement("div");
        cardDiv.className = "card";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = `Bricka ${i + 1}`;
        cardDiv.appendChild(title);

        const table = document.createElement("table");
        const header = document.createElement("tr");

        ["B", "I", "N", "G", "O"].forEach((letter) => {
          const th = document.createElement("th");
          th.textContent = letter;
          header.appendChild(th);
        });

        table.appendChild(header);

        const cols = {};
        Object.entries(ranges).forEach(([letter, [start, end]]) => {
          const arr = [];
          for (let n = start; n <= end; n++) {
            arr.push(n);
          }
          shuffle(arr);
          cols[letter] = arr;
        });

        for (let row = 0; row < 15; row++) {
          const tr = document.createElement("tr");

          Object.keys(ranges).forEach((letter) => {
            const td = document.createElement("td");
            td.textContent = cols[letter][row];
            tr.appendChild(td);
          });

          table.appendChild(tr);
        }

        cardDiv.appendChild(table);
        cardsContainer.appendChild(cardDiv);
      }
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function startGame() {
      if (intervalId || waitingForContinue || gameFinished) {
        return;
      }

      if (drawn.length === 0) {
        remaining = [...numbers];
        drawn = [];
        winnerEl.textContent = "";
        currentLevel = 1;
        waitingForContinue = false;
        gameFinished = false;
        continueBtn.style.display = "none";
        newGameBtn.style.display = "none";
        clearHighlights();
        unmarkAllCards();
        updateHistory();
      }

      drawNumber();

      if (!waitingForContinue && !gameFinished && remaining.length > 0) {
        intervalId = setInterval(drawNumber, getDelay());
      }
    }

    function stopGame() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function drawNumber() {
      if (waitingForContinue || gameFinished) {
        stopGame();
        return;
      }

      if (!remaining.length) {
        stopGame();
        winnerEl.textContent = "Alla nummer är dragna.";
        if (getMode() === "three-level") {
          newGameBtn.style.display = "inline-block";
        }
        return;
      }

      const idx = Math.floor(Math.random() * remaining.length);
      const num = remaining.splice(idx, 1)[0];
      drawn.push(num);

      const letter = getLetter(num);
      currentLetterEl.textContent = letter;
      currentNumberEl.textContent = num;

      updateHistory();

      if (parseInt(playerCountSelect.value, 10) !== 0) {
        markCards(num);
        updateCompletedRowHighlights();

        const result = evaluateWinState();
        if (result.hit) {
          handleWinResult(result);
          return;
        }
      }

      playDrawSound(letter, num);
      bgm.play().catch(() => {});
    }

    function updateHistory() {
      if (!drawn.length) {
        historyEl.textContent = "";
        return;
      }

      const formatted = drawn.map((num) => `${getLetter(num)}${num}`);
      historyEl.textContent = "Dragna nummer: " + formatted.join(" - ");
    }

    function playDrawSound(letter, num) {
      if (!speakEnabled) {
        ding.currentTime = 0;
        ding.play().catch(() => {});
        return;
      }

      const letterAudio = new Audio(`audio/${letter}.mp3`);
      letterAudio.onended = () => {
        const numberAudio = new Audio(`audio/${num}.mp3`);
        numberAudio.play().catch(() => {});
      };
      letterAudio.play().catch(() => {});
    }

    function getLetter(n) {
      if (n <= 15) return "B";
      if (n <= 30) return "I";
      if (n <= 45) return "N";
      if (n <= 60) return "G";
      return "O";
    }

    function markCards(n) {
      cardsContainer.querySelectorAll(".card").forEach((card) => {
        card.querySelectorAll("td").forEach((td) => {
          if (parseInt(td.textContent, 10) === n) {
            td.classList.add("marked");
          }
        });
      });
    }

    function clearHighlights() {
      cardsContainer.querySelectorAll(".completed").forEach((cell) => {
        cell.classList.remove("completed");
      });
    }

    function unmarkAllCards() {
      cardsContainer.querySelectorAll(".marked").forEach((cell) => {
        cell.classList.remove("marked");
      });
    }

    function getCompletedRowsForCard(cardEl) {
      const rows = Array.from(cardEl.querySelectorAll("tr")).slice(1);
      const completedRows = [];

      rows.forEach((rowEl, rowIndex) => {
        const cells = Array.from(rowEl.querySelectorAll("td"));
        const isFullRow = cells.length > 0 && cells.every((td) => td.classList.contains("marked"));

        if (isFullRow) {
          completedRows.push(rowIndex + 1);
        }
      });

      return completedRows;
    }

    function updateCompletedRowHighlights() {
      clearHighlights();

      const cards = Array.from(cardsContainer.querySelectorAll(".card"));

      cards.forEach((cardEl) => {
        const rows = Array.from(cardEl.querySelectorAll("tr")).slice(1);

        rows.forEach((rowEl) => {
          const cells = Array.from(rowEl.querySelectorAll("td"));
          const isFullRow = cells.length > 0 && cells.every((td) => td.classList.contains("marked"));

          if (isFullRow) {
            cells.forEach((td) => td.classList.add("completed"));
          }
        });
      });
    }

    function getWinnersForLevel(level) {
      const cards = Array.from(cardsContainer.querySelectorAll(".card"));
      const winners = [];

      cards.forEach((cardEl, cardIndex) => {
        const completedRows = getCompletedRowsForCard(cardEl);

        if (completedRows.length >= level) {
          winners.push({
            cardIndex,
            completedRows
          });
        }
      });

      return winners;
    }

    function formatWinnerNames(winners) {
      const names = winners.map((winner) => `Bricka ${winner.cardIndex + 1}`);

      if (names.length === 1) return names[0];
      if (names.length === 2) return `${names[0]} och ${names[1]}`;
      return `${names.slice(0, -1).join(", ")} och ${names[names.length - 1]}`;
    }

    function evaluateWinState() {
      if (parseInt(playerCountSelect.value, 10) === 0) {
        return { hit: false };
      }

      if (getMode() === "standard") {
        const winners = getWinnersForLevel(1);
        if (winners.length > 0) {
          return {
            hit: true,
            level: 1,
            winners,
            final: true
          };
        }
        return { hit: false };
      }

      const winners = getWinnersForLevel(currentLevel);

      if (winners.length > 0) {
        return {
          hit: true,
          level: currentLevel,
          winners,
          final: currentLevel >= 3
        };
      }

      return { hit: false };
    }

    function handleWinResult(result) {
      stopGame();
      updateCompletedRowHighlights();

      bingoSound.currentTime = 0;
      bingoSound.play().catch(() => {});

      const winnerText = formatWinnerNames(result.winners);

      if (getMode() === "standard") {
        winnerEl.textContent =
          result.winners.length === 1
            ? `BINGO! ${winnerText} vann!`
            : `BINGO! Delad vinst: ${winnerText}!`;

        gameFinished = true;
        continueBtn.style.display = "none";
        newGameBtn.style.display = "inline-block";
        updateStatusBar();
        return;
      }

      winnerEl.textContent =
        result.winners.length === 1
          ? `BINGO ${result.level}! ${winnerText} fick bingo.`
          : `BINGO ${result.level}! Delad vinst: ${winnerText}.`;

      if (result.final) {
        gameFinished = true;
        waitingForContinue = false;
        continueBtn.style.display = "none";
        newGameBtn.style.display = "inline-block";
      } else {
        waitingForContinue = true;
        continueBtn.style.display = "inline-block";
        newGameBtn.style.display = "none";
      }

      updateStatusBar();
    }

    function continueAfterLevel() {
      if (!waitingForContinue || gameFinished) {
        return;
      }

      waitingForContinue = false;
      currentLevel += 1;
      continueBtn.style.display = "none";
      winnerEl.textContent = "";

      updateStatusBar();

      if (!remaining.length) {
        winnerEl.textContent = "Inga fler nummer kvar att dra.";
        newGameBtn.style.display = "inline-block";
        return;
      }

      intervalId = setInterval(drawNumber, getDelay());
    }

    resetGame();
  </script>
</body>
</html>
